<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAlpha Music Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #141e30, #243b55);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .player {
      width: 360px;
      background: #ffffff;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .player h1 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #1f2937;
    }

    .album {
      width: 220px;
      height: 220px;
      margin: 0 auto 15px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .album img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .song-title {
      font-size: 22px;
      font-weight: bold;
      color: #111827;
      margin-bottom: 5px;
    }

    .artist {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    .progress-container {
      width: 100%;
      height: 6px;
      background: #d1d5db;
      border-radius: 10px;
      cursor: pointer;
      margin: 15px 0 10px;
      position: relative;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: #3b82f6;
      border-radius: 10px;
    }

    .time {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #4b5563;
      margin-bottom: 15px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 15px 0;
    }

    .controls button {
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 18px;
      padding: 12px 16px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s;
    }

    .controls button:hover {
      transform: scale(1.08);
      background: #2563eb;
    }

    .play-btn {
      font-size: 22px;
      padding: 15px 20px;
    }

    .volume-box {
      margin-top: 20px;
      text-align: left;
    }

    .volume-box label {
      display: block;
      margin-bottom: 8px;
      color: #111827;
      font-weight: bold;
    }

    .volume-box input {
      width: 100%;
      cursor: pointer;
    }

    .playlist {
      margin-top: 20px;
      text-align: left;
    }

    .playlist h3 {
      margin-bottom: 10px;
      color: #111827;
    }

    .playlist ul {
      list-style: none;
      max-height: 140px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .playlist li {
      padding: 10px;
      margin-bottom: 8px;
      background: #f3f4f6;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }

    .playlist li:hover,
    .playlist li.active {
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
    }

    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div class="player">
    <h1>Music Player</h1>

    <div class="album">
      <img id="cover" src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=600" alt="Album Cover">
    </div>

    <div class="song-title" id="title">Song 1</div>
    <div class="artist" id="artist">Artist 1</div>

    <audio id="audio"></audio>

    <div class="progress-container" id="progressContainer">
      <div class="progress" id="progress"></div>
    </div>

    <div class="time">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button onclick="nextSong()">⏭</button>
    </div>

    <div class="volume-box">
      <label for="volume">Volume</label>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    </div>

    <div class="playlist">
      <h3>Playlist</h3>
      <ul id="playlist"></ul>
    </div>

     </div>

  <script>
    const songs = [
      {
        title: "Song 1",
        artist: "Artist 1",
        src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        cover: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=600"
      },
      {
        title: "Song 2",
        artist: "Artist 2",
        src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
        cover: "https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=600"
      },
      {
        title: "Song 3",
        artist: "Artist 3",
        src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
        cover: "https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=600"
      }
    ];

    const audio = document.getElementById("audio");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const cover = document.getElementById("cover");
    const playBtn = document.getElementById("playBtn");
    const progress = document.getElementById("progress");
    const progressContainer = document.getElementById("progressContainer");
    const currentTimeEl = document.getElementById("currentTime");
    const durationEl = document.getElementById("duration");
    const volume = document.getElementById("volume");
    const playlist = document.getElementById("playlist");

    let songIndex = 0;
    let isPlaying = false;

    function loadSong(index) {
      const song = songs[index];
      title.textContent = song.title;
      artist.textContent = song.artist;
      audio.src = song.src;
      cover.src = song.cover;
      updatePlaylistUI();
    }

    function togglePlay() {
      if (isPlaying) {
        audio.pause();
        playBtn.textContent = "▶";
        isPlaying = false;
      } else {
        audio.play();
        playBtn.textContent = "⏸";
        isPlaying = true;
      }
    }

    function prevSong() {
      songIndex--;
      if (songIndex < 0) songIndex = songs.length - 1;
      loadSong(songIndex);
      audio.play();
      playBtn.textContent = "⏸";
      isPlaying = true;
    }

    function nextSong() {
      songIndex++;
      if (songIndex >= songs.length) songIndex = 0;
      loadSong(songIndex);
      audio.play();
      playBtn.textContent = "⏸";
      isPlaying = true;
    }

    function updateProgress() {
      if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = percent + "%";

        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationEl.textContent = formatTime(audio.duration);
      }
    }

    function setProgress(e) {
      const width = progressContainer.clientWidth;
      const clickX = e.offsetX;
      const duration = audio.duration;
      audio.currentTime = (clickX / width) * duration;
    }

    function formatTime(time) {
      const mins = Math.floor(time / 60);
      const secs = Math.floor(time % 60);
      return `${mins}:${secs < 10 ? "0" : ""}${secs}`;
    }

    volume.addEventListener("input", () => {
      audio.volume = volume.value;
    });

    audio.addEventListener("timeupdate", updateProgress);
    progressContainer.addEventListener("click", setProgress);
    audio.addEventListener("ended", nextSong);

    function createPlaylist() {
      playlist.innerHTML = "";
      songs.forEach((song, index) => {
        const li = document.createElement("li");
        li.textContent = `${song.title} - ${song.artist}`;
        li.onclick = () => {
          songIndex = index;
          loadSong(songIndex);
          audio.play();
          playBtn.textContent = "⏸";
          isPlaying = true;
        };
        playlist.appendChild(li);
      });
    }

    function updatePlaylistUI() {
      const items = playlist.querySelectorAll("li");
      items.forEach((item, index) => {
        item.classList.toggle("active", index === songIndex);
      });
    }

    loadSong(songIndex);
    createPlaylist();
  </script>

</body>
</html>
